<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>Master System Config - Admin</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
    <link href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css" rel="stylesheet">
    <style>
        body { background-color: #f8f9fa; }
        .config-card { border-radius: 12px; box-shadow: 0 4px 6px rgba(0,0,0,0.05); margin-bottom: 25px; border: none; }
        .config-header { background: #0056b3; color: white; border-radius: 12px 12px 0 0 !important; font-weight: bold; }
        .delete-btn { color: #dc3545; cursor: pointer; border: none; background: none; }
        .delete-btn:hover { color: #a71d2a; }
        .list-group-item { display: flex; justify-content: space-between; align-items: center; }
    </style>
</head>
<body>

<nav class="navbar navbar-expand-lg navbar-dark bg-dark mb-4">
    <div class="container-fluid">
        <a class="navbar-brand" href="#"><i class="fas fa-cogs"></i> Master Configuration</a>
        <a href="{{ url_for('admin_dashboard') }}" class="btn btn-outline-light btn-sm"><i class="fas fa-arrow-left"></i> Back to Dashboard</a>
    </div>
</nav>

<div class="container pb-5">
    {% with messages = get_flashed_messages(with_categories=true) %}
        {% if messages %}
            {% for category, message in messages %}
                <div class="alert alert-{{ 'success' if category == 'success' else 'danger' }} alert-dismissible fade show">
                    {{ message }}
                    <button type="button" class="btn-close" data-bs-dismiss="alert"></button>
                </div>
            {% endfor %}
        {% endif %}
    {% endwith %}

    <div class="row">
        <div class="col-md-4">
            <div class="card config-card">
                <div class="card-header config-header"><i class="fas fa-users"></i> Staff & Departments</div>
                <div class="card-body">
                    <form method="POST" class="mb-3 d-flex">
                        <input type="hidden" name="action" value="add_dept">
                        <input type="text" name="department" class="form-control form-control-sm me-2" placeholder="New Department" required>
                        <button class="btn btn-primary btn-sm"><i class="fas fa-plus"></i></button>
                    </form>

                    <select id="dept_select" class="form-select form-select-sm mb-3" onchange="renderRequestors()">
                        <option value="">-- Select Department to Manage --</option>
                    </select>

                    <form method="POST" id="add_req_form" class="mb-3 d-flex" style="display:none !important;">
                        <input type="hidden" name="action" value="add_requestor">
                        <input type="hidden" name="department" id="req_form_dept">
                        <input type="text" name="name" class="form-control form-control-sm me-2" placeholder="Add Staff Name" required>
                        <button class="btn btn-success btn-sm"><i class="fas fa-plus"></i></button>
                    </form>

                    <ul class="list-group list-group-flush" id="requestor_list"></ul>
                </div>
            </div>
        </div>

        <div class="col-md-8">
            <div class="card config-card">
                <div class="card-header config-header bg-success"><i class="fas fa-tasks"></i> Task Cascade Rules</div>
                <div class="card-body">
                    <div class="row">
                        <div class="col-4">
                            <label class="fw-bold small">Activity Type</label>
                            <form method="POST" class="d-flex mb-2">
                                <input type="hidden" name="action" value="add_activity">
                                <input type="text" name="activity" class="form-control form-control-sm me-1" placeholder="New Activity" required>
                                <button class="btn btn-primary btn-sm">+</button>
                            </form>
                            <select id="act_select" class="form-select form-select-sm" size="8" onchange="renderActions()"></select>
                            <form method="POST" class="mt-2 text-end" id="del_act_form">
                                <input type="hidden" name="action" value="delete_activity">
                                <input type="hidden" name="activity" id="del_act_val">
                                <button class="btn btn-sm btn-outline-danger" onclick="return confirm('Delete this entire activity?')"><i class="fas fa-trash"></i> Delete Selected</button>
                            </form>
                        </div>
                        
                        <div class="col-4">
                            <label class="fw-bold small">Action Required</label>
                            <form method="POST" class="d-flex mb-2" id="add_action_form" style="visibility: hidden;">
                                <input type="hidden" name="action" value="add_action">
                                <input type="hidden" name="activity" id="action_parent_act">
                                <input type="text" name="req_action" class="form-control form-control-sm me-1" placeholder="New Action" required>
                                <button class="btn btn-success btn-sm">+</button>
                            </form>
                            <select id="req_act_select" class="form-select form-select-sm" size="8" onchange="renderInstruments()"></select>
                            <form method="POST" class="mt-2 text-end" id="del_req_act_form" style="visibility: hidden;">
                                <input type="hidden" name="action" value="delete_action">
                                <input type="hidden" name="activity" id="del_req_parent_act">
                                <input type="hidden" name="req_action" id="del_req_val">
                                <button class="btn btn-sm btn-outline-danger"><i class="fas fa-trash"></i></button>
                            </form>
                        </div>

                        <div class="col-4">
                            <label class="fw-bold small">Allowed Instruments</label>
                            <form method="POST" class="d-flex mb-2" id="add_inst_form" style="visibility: hidden;">
                                <input type="hidden" name="action" value="add_instrument">
                                <input type="hidden" name="activity" id="inst_parent_act">
                                <input type="hidden" name="req_action" id="inst_parent_req">
                                <input type="text" name="instrument" class="form-control form-control-sm me-1" placeholder="New Inst" required>
                                <button class="btn btn-warning btn-sm">+</button>
                            </form>
                            <ul class="list-group list-group-flush border" id="inst_list" style="height: 185px; overflow-y: auto;"></ul>
                        </div>
                    </div>
                </div>
            </div>
        </div>
    </div>
</div>

<script id="master_data" type="application/json">
    {{ master_schema_json | safe }}
</script>

<script>
    const masterData = JSON.parse(document.getElementById('master_data').textContent);
    const reqData = masterData.requestors || {};
    const actData = masterData.activities || {};

    // --- 1. REQUESTOR LOGIC ---
    const deptSelect = document.getElementById('dept_select');
    Object.keys(reqData).sort().forEach(dept => {
        deptSelect.add(new Option(dept, dept));
    });

    function renderRequestors() {
        const dept = deptSelect.value;
        const list = document.getElementById('requestor_list');
        const form = document.getElementById('add_req_form');
        document.getElementById('req_form_dept').value = dept;
        list.innerHTML = '';
        
        if (!dept) { form.style.setProperty('display', 'none', 'important'); return; }
        form.style.setProperty('display', 'flex', 'important');
        
        reqData[dept].forEach(name => {
            list.innerHTML += `
                <li class="list-group-item py-1 px-2 small">
                    ${name}
                    <form method="POST" style="margin:0;">
                        <input type="hidden" name="action" value="delete_requestor">
                        <input type="hidden" name="department" value="${dept}">
                        <input type="hidden" name="name" value="${name}">
                        <button type="submit" class="delete-btn"><i class="fas fa-times"></i></button>
                    </form>
                </li>`;
        });
        list.innerHTML += `
            <li class="list-group-item py-1 px-2 small bg-light text-danger text-center">
                <form method="POST" style="margin:0;" onsubmit="return confirm('Delete entire department?')">
                    <input type="hidden" name="action" value="delete_dept">
                    <input type="hidden" name="department" value="${dept}">
                    <button type="submit" class="btn btn-link text-danger p-0 m-0 text-decoration-none"><i class="fas fa-trash"></i> Delete Department</button>
                </form>
            </li>`;
    }

    // --- 2. ACTIVITY LOGIC ---
    const actSelect = document.getElementById('act_select');
    const reqActSelect = document.getElementById('req_act_select');
    const instList = document.getElementById('inst_list');

    Object.keys(actData).sort().forEach(act => {
        actSelect.add(new Option(act, act));
    });

    function renderActions() {
        const act = actSelect.value;
        reqActSelect.innerHTML = '';
        instList.innerHTML = '';
        
        document.getElementById('del_act_val').value = act;
        document.getElementById('add_action_form').style.visibility = act ? 'visible' : 'hidden';
        document.getElementById('action_parent_act').value = act;
        document.getElementById('del_req_act_form').style.visibility = 'hidden';
        document.getElementById('add_inst_form').style.visibility = 'hidden';

        if(act && actData[act]) {
            Object.keys(actData[act]).sort().forEach(req => {
                reqActSelect.add(new Option(req, req));
            });
        }
    }

    function renderInstruments() {
        const act = actSelect.value;
        const req = reqActSelect.value;
        instList.innerHTML = '';

        document.getElementById('del_req_act_form').style.visibility = req ? 'visible' : 'hidden';
        document.getElementById('del_req_parent_act').value = act;
        document.getElementById('del_req_val').value = req;

        document.getElementById('add_inst_form').style.visibility = req ? 'visible' : 'hidden';
        document.getElementById('inst_parent_act').value = act;
        document.getElementById('inst_parent_req').value = req;

        if(act && req && actData[act][req]) {
            actData[act][req].forEach(inst => {
                instList.innerHTML += `
                    <li class="list-group-item py-1 px-2 small">
                        ${inst}
                        <form method="POST" style="margin:0;">
                            <input type="hidden" name="action" value="delete_instrument">
                            <input type="hidden" name="activity" value="${act}">
                            <input type="hidden" name="req_action" value="${req}">
                            <input type="hidden" name="instrument" value="${inst}">
                            <button type="submit" class="delete-btn"><i class="fas fa-times"></i></button>
                        </form>
                    </li>`;
            });
        }
    }
</script>
</body>
</html>

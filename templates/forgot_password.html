<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>Forgot Password - NMDC</title>
    <style>
        body { font-family: Arial; background-color: #f4f7f6; display: flex; justify-content: center; align-items: center; height: 100vh; margin: 0; }
        .auth-card { background: white; padding: 30px; border-radius: 8px; box-shadow: 0 4px 10px rgba(0,0,0,0.1); width: 100%; max-width: 400px; text-align: center; }
        .form-group { margin-bottom: 15px; text-align: left; }
        label { font-weight: bold; margin-bottom: 5px; display: block; font-size: 14px; color: #444; }
        input { width: 100%; padding: 10px; font-size: 16px; border: 1px solid #ccc; border-radius: 4px; box-sizing: border-box; }
        button { background-color: #0056b3; color: white; border: none; padding: 12px; font-size: 16px; border-radius: 6px; cursor: pointer; width: 100%; font-weight: bold; margin-top: 10px; }
        .flash-msg { padding: 10px; border-radius: 4px; font-weight: bold; margin-bottom: 15px; font-size: 14px; }
        .flash-error { background-color: #f8d7da; color: #721c24; border: 1px solid #f5c6cb; }
    </style>
</head>
<body>
    <div class="auth-card">
        <h2 style="color: #0056b3; margin-top: 0;">Reset Password</h2>
        <p style="color: #666; font-size: 14px; margin-bottom: 20px;">Enter your @nmdc-group.com email address and we will send you a secure reset link.</p>
        
        {% with messages = get_flashed_messages(with_categories=true) %}
            {% if messages %}
                {% for category, message in messages %}
                    <div class="flash-msg {% if category == 'error' %}flash-error{% else %}flash-success{% endif %}">
                        {{ message }}
                    </div>
                {% endfor %}
            {% endif %}
        {% endwith %}

        <form method="POST">
            <div class="form-group">
                <label>NMDC Email Address</label>
                <input type="email" name="email" required placeholder="name@nmdc-group.com">
            </div>
            <button type="submit">Send Reset Link</button>
        </form>
        <div style="margin-top: 15px;">
            <a href="/login" style="color: #666; text-decoration: none; font-size: 14px;">Back to Login</a>
        </div>
    </div>
</body>
</html>

<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Register - NMDC Survey</title>
    <style>
        body { font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, Arial, sans-serif; background-color: #f4f7f6; padding: 20px; display: flex; justify-content: center; align-items: center; min-height: 90vh; margin: 0; }
        .card { background: white; padding: 30px; border-radius: 12px; box-shadow: 0 4px 15px rgba(0,0,0,0.05); width: 100%; max-width: 400px; box-sizing: border-box; }
        h2 { text-align: center; color: #333; margin-top: 0; }
        .form-group { margin-bottom: 20px; position: relative; }
        label { font-weight: 600; margin-bottom: 8px; display: block; color: #555; font-size: 14px; }
        input { width: 100%; padding: 12px; font-size: 16px; border: 1px solid #ccc; border-radius: 6px; box-sizing: border-box; transition: border-color 0.3s; }
        input:focus { border-color: #0056b3; outline: none; }
        .eye-icon { position: absolute; right: 12px; top: 38px; cursor: pointer; color: #666; font-size: 18px; user-select: none; }
        button { background-color: #28a745; color: white; border: none; padding: 14px; font-size: 16px; font-weight: bold; border-radius: 6px; cursor: pointer; width: 100%; margin-top: 10px; }
        .links { margin-top: 20px; text-align: center; font-size: 14px; }
        .links a { color: #0056b3; text-decoration: none; }
        .flash { padding: 10px; border-radius: 6px; margin-bottom: 15px; text-align: center; font-size: 14px; }
        .flash.error { background-color: #ffe6e6; color: #cc0000; }
        .helper-text { font-size: 12px; color: #777; margin-top: 4px; display: block; }
    </style>
</head>
<body>
    <div class="card">
        <h2>Register Account</h2>
        {% with messages = get_flashed_messages(with_categories=true) %}
          {% if messages %}
            {% for category, message in messages %}
              <div class="flash {{ category }}">{{ message }}</div>
            {% endfor %}
          {% endif %}
        {% endwith %}
        
        <form method="POST" action="/register">
            <div class="form-group">
                <label>Corporate Email:</label>
                <input type="email" name="email" placeholder="First.Last@nmdc-group.com" required>
                <span class="helper-text">Only @nmdc-group.com domains allowed</span>
            </div>
            
            <div class="form-group">
                <label>Password:</label>
                <input type="password" name="password" id="regPass" required>
                <span class="eye-icon" onclick="togglePass('regPass', this)">👁️</span>
            </div>

            <div class="form-group">
                <label>Confirm Password:</label>
                <input type="password" name="confirm_password" id="regConfirmPass" required>
                <span class="eye-icon" onclick="togglePass('regConfirmPass', this)">👁️</span>
            </div>
            
            <button type="submit">Create Account</button>
        </form>
        <div class="links"><a href="/login">Already have an account? Login here</a></div>
    </div>

    <script>
        function togglePass(inputId, icon) {
            let input = document.getElementById(inputId);
            if (input.type === "password") {
                input.type = "text";
                icon.innerText = "🙈";
            } else {
                input.type = "password";
                icon.innerText = "👁️";
            }
        }
    </script>
</body>
</html>

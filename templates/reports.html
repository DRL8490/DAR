<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>Report Wizard - NMDC</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
    <link href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css" rel="stylesheet">
    <style>
        body { background-color: #f8f9fa; padding-top: 40px; }
        .wizard-card { max-width: 600px; margin: 0 auto; border-radius: 12px; box-shadow: 0 4px 6px rgba(0,0,0,0.1); border: none; }
        .wizard-header { background: #0056b3; color: white; border-radius: 12px 12px 0 0 !important; padding: 20px; text-align: center; }
    </style>
</head>
<body>

<div class="container">
    <div class="mb-3 text-center">
        <a href="{{ url_for('admin_dashboard') }}" class="btn btn-outline-secondary"><i class="fas fa-arrow-left"></i> Back to Dashboard</a>
    </div>

    {% with messages = get_flashed_messages(with_categories=true) %}
        {% if messages %}
            {% for category, message in messages %}
                <div class="alert alert-{{ 'success' if category == 'success' else 'danger' }} alert-dismissible fade show" style="max-width: 600px; margin: 0 auto 20px auto;">
                    {{ message }}
                    <button type="button" class="btn-close" data-bs-dismiss="alert"></button>
                </div>
            {% endfor %}
        {% endif %}
    {% endwith %}

    <div class="card wizard-card">
        <div class="card-header wizard-header">
            <h3 class="mb-0"><i class="fas fa-file-word"></i> DTR Auto-Generator</h3>
            <p class="mb-0 small opacity-75">Select a date to generate the Daily Task Report.</p>
        </div>
        <div class="card-body p-4">
            
            <form action="{{ url_for('generate_dtr') }}" method="POST">
                <div class="mb-4">
                    <label class="form-label fw-bold">Target Report Date</label>
                    <input type="date" name="dtr_date" class="form-control form-control-lg" required>
                </div>
                
                <button type="submit" class="btn btn-success btn-lg w-100"><i class="fas fa-download"></i> Generate & Download DTR (.docx)</button>
            </form>

        </div>
    </div>
</div>

<script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/js/bootstrap.bundle.min.js"></script>
</body>
</html>

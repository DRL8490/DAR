<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Daily Activity Reporting</title>
    <style>
        body { font-family: Arial, sans-serif; padding: 20px; max-width: 600px; }
        .form-group { margin-bottom: 15px; display: flex; align-items: center; gap: 10px; }
        select { flex-grow: 1; padding: 8px; }
        button { padding: 8px 12px; cursor: pointer; background-color: #0056b3; color: white; border: none; border-radius: 4px; }
        button:hover { background-color: #004494; }
    </style>
</head>
<body>

    <h2>Task Input Page</h2>

    <div class="form-group">
        <label style="width: 100px;">Area:</label>
        <select id="areaDropdown" onchange="updateLocations()"></select>
        <button onclick="addItem('area')">+ Add</button>
    </div>

    <div class="form-group">
        <label style="width: 100px;">Location:</label>
        <select id="locationDropdown" onchange="updateSubLocations()"></select>
        <button onclick="addItem('location')">+ Add</button>
    </div>

    <div class="form-group">
        <label style="width: 100px;">Sub-Location:</label>
        <select id="subLocationDropdown" onchange="updateWorkScopes()"></select>
        <button onclick="addItem('subLocation')">+ Add</button>
    </div>

    <div class="form-group">
        <label style="width: 100px;">Work Scope:</label>
        <select id="workScopeDropdown"></select>
        <button onclick="addItem('workScope')">+ Add</button>
    </div>

    <script>
        // Your initial project schema
        let schema = {
            "01_Onshore_Area_Scope": {
                "Taichung": {
                    "AHDD": ["General", "Trial Pits", "Thruster Pit", "Crossover Pits", "Grit Tank", "Drainage"],
                    "Tienli": ["General"],
                    "Berth37": ["General"]
                },
                "Tunghsiao": {
                    "Temp Platform": ["General", "Trial Pits", "Thruster Pit", "Crossover Pits", "Grit Tank", "Drainage"],
                    "Inside Plant": ["General", "Trial Pits", "Thruster Pit", "Crossover Pits"]
                }
            },
            "02_Nearshore_Area_Scope": {
                "Taichung": { "Trench 1": ["General", "Dredging", "Pipeline A", "Pipeline B", "SRI", "Backfilling"] },
                "Tunghsiao": { "Trench 8": ["General", "Dredging", "Pipeline A", "Pipeline B", "SRI", "Backfilling"] }
            },
            "03_Offshore_Area_Scope": {
                "N/A": {
                    "Trench 2": ["General", "Pipelaying A", "Pipelaying B", "Post-Trenching", "SRI"],
                    "Trench 7": ["General", "Dredging_Midline Tie-In", "Pipeline A", "Pipeline B", "Post-Trenching", "SRI", "Backfilling"]
                }
            },
            "04_Marine_Area_Scope": {
                "N/A": { "N/A": ["General", "Pipeline A", "Pipeline B", "Pipeline SRI", "Backfill"] }
            }
        };

        // Helper function to populate a dropdown
        function populateDropdown(dropdownId, optionsList) {
            let dropdown = document.getElementById(dropdownId);
            dropdown.innerHTML = '<option value="">-- Select --</option>'; // Reset
            optionsList.forEach(option => {
                let opt = document.createElement('option');
                opt.value = option;
                opt.innerHTML = option;
                dropdown.appendChild(opt);
            });
        }

        // 1. Load Areas on startup
        function loadAreas() {
            populateDropdown("areaDropdown", Object.keys(schema));
            updateLocations(); // Clear lower levels
        }

        // 2. When Area changes, load Locations
        function updateLocations() {
            let area = document.getElementById("areaDropdown").value;
            let locations = area && schema[area] ? Object.keys(schema[area]) : [];
            populateDropdown("locationDropdown", locations);
            updateSubLocations(); // Clear lower levels
        }

        // 3. When Location changes, load Sub-Locations
        function updateSubLocations() {
            let area = document.getElementById("areaDropdown").value;
            let location = document.getElementById("locationDropdown").value;
            let subLocations = (area && location && schema[area][location]) ? Object.keys(schema[area][location]) : [];
            populateDropdown("subLocationDropdown", subLocations);
            updateWorkScopes(); // Clear lower levels
        }

        // 4. When Sub-Location changes, load Work Scopes
        function updateWorkScopes() {
            let area = document.getElementById("areaDropdown").value;
            let location = document.getElementById("locationDropdown").value;
            let subLocation = document.getElementById("subLocationDropdown").value;
            let scopes = (area && location && subLocation && schema[area][location][subLocation]) ? schema[area][location][subLocation] : [];
            populateDropdown("workScopeDropdown", scopes);
        }

        // 5. The function to ADD new items dynamically to the JSON hierarchy
        function addItem(level) {
            let area = document.getElementById("areaDropdown").value;
            let location = document.getElementById("locationDropdown").value;
            let subLocation = document.getElementById("subLocationDropdown").value;

            let newItem = prompt("Enter new " + level + ":");
            if (!newItem) return;

            if (level === 'area') {
                schema[newItem] = {};
                loadAreas();
                document.getElementById("areaDropdown").value = newItem;
                updateLocations();
            } 
            else if (level === 'location' && area) {
                schema[area][newItem] = {};
                updateLocations();
                document.getElementById("locationDropdown").value = newItem;
                updateSubLocations();
            } 
            else if (level === 'subLocation' && area && location) {
                schema[area][location][newItem] = [];
                updateSubLocations();
                document.getElementById("subLocationDropdown").value = newItem;
                updateWorkScopes();
            } 
            else if (level === 'workScope' && area && location && subLocation) {
                schema[area][location][subLocation].push(newItem);
                updateWorkScopes();
                document.getElementById("workScopeDropdown").value = newItem;
            } else {
                alert("Please select the parent categories first!");
            }
        }

        // Initialize the page
        loadAreas();
    </script>
</body>
</html>

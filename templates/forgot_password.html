<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Reset Password</title>
    <style>
        /* Exact same CSS */
        body { font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, Arial, sans-serif; background-color: #f4f7f6; padding: 20px; display: flex; justify-content: center; align-items: center; min-height: 90vh; margin: 0; }
        .card { background: white; padding: 30px; border-radius: 12px; box-shadow: 0 4px 15px rgba(0,0,0,0.05); width: 100%; max-width: 400px; box-sizing: border-box; }
        h2 { text-align: center; color: #333; margin-top: 0; margin-bottom: 5px; }
        p.subtitle { text-align: center; color: #666; font-size: 14px; margin-bottom: 25px; }
        .form-group { margin-bottom: 20px; position: relative; }
        label { font-weight: 600; margin-bottom: 8px; display: block; color: #555; font-size: 14px; }
        input { width: 100%; padding: 12px; font-size: 16px; border: 1px solid #ccc; border-radius: 6px; box-sizing: border-box; transition: border-color 0.3s; }
        input:focus { border-color: #0056b3; outline: none; }
        .eye-icon { position: absolute; right: 12px; top: 38px; cursor: pointer; color: #666; font-size: 18px; user-select: none; }
        button { background-color: #ffc107; color: black; border: none; padding: 14px; font-size: 16px; font-weight: bold; border-radius: 6px; cursor: pointer; width: 100%; margin-top: 10px; }
        .links { margin-top: 20px; text-align: center; font-size: 14px; }
        .links a { color: #0056b3; text-decoration: none; }
    </style>
</head>
<body>
    <div class="card">
        <h2>Reset Password</h2>
        <p class="subtitle">Enter your email and new password.</p>
        
        <form onsubmit="alert('Email server not configured yet! Contact Admin.'); return false;">
            <div class="form-group">
                <label>Corporate Email:</label>
                <input type="email" required>
            </div>
            <div class="form-group">
                <label>New Password:</label>
                <input type="password" id="resetPass" required>
                <span class="eye-icon" onclick="togglePass('resetPass', this)">👁️</span>
            </div>
            <div class="form-group">
                <label>Confirm New Password:</label>
                <input type="password" id="resetConfirm" required>
                <span class="eye-icon" onclick="togglePass('resetConfirm', this)">👁️</span>
            </div>
            <button type="submit">Update Password</button>
        </form>
        <div class="links"><a href="/login">Back to Login</a></div>
    </div>

    <script>
        function togglePass(inputId, icon) {
            let input = document.getElementById(inputId);
            if (input.type === "password") { input.type = "text"; icon.innerText = "🙈"; } 
            else { input.type = "password"; icon.innerText = "👁️"; }
        }
    </script>
</body>
</html>

<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Register - NMDC</title>
    <style>
        body { font-family: Arial; background-color: #f4f7f6; padding: 20px; display: flex; justify-content: center; align-items: center; min-height: 90vh; }
        .card { background: white; padding: 30px; border-radius: 12px; box-shadow: 0 4px 15px rgba(0,0,0,0.05); width: 100%; max-width: 400px; }
        h2 { text-align: center; margin-top: 0; }
        .form-group { margin-bottom: 20px; position: relative; }
        label { font-weight: 600; margin-bottom: 8px; display: block; font-size: 14px; }
        input { width: 100%; padding: 12px; font-size: 16px; border: 1px solid #ccc; border-radius: 6px; box-sizing: border-box; }
        .eye-icon { position: absolute; right: 12px; top: 38px; cursor: pointer; font-size: 18px; user-select: none; }
        button { background-color: #28a745; color: white; border: none; padding: 14px; font-size: 16px; font-weight: bold; border-radius: 6px; cursor: pointer; width: 100%; }
        .flash { padding: 10px; border-radius: 6px; margin-bottom: 15px; text-align: center; font-size: 14px; background-color: #ffe6e6; color: #cc0000; }
    </style>
</head>
<body>
    <div class="card">
        <h2>Register Account</h2>
        {% with messages = get_flashed_messages() %}
          {% if messages %}<div class="flash">{{ messages[0] }}</div>{% endif %}
        {% endwith %}
        <form method="POST">
            <div class="form-group">
                <label>Corporate Email:</label>
                <input type="email" name="email" placeholder="First.Last@nmdc-group.com" required>
            </div>
            <div class="form-group">
                <label>Password:</label>
                <input type="password" name="password" id="regPass" required>
                <span class="eye-icon" onclick="togglePass('regPass', this)">👁️</span>
            </div>
            <div class="form-group">
                <label>Confirm Password:</label>
                <input type="password" name="confirm_password" id="regConfirm" required>
                <span class="eye-icon" onclick="togglePass('regConfirm', this)">👁️</span>
            </div>
            <button type="submit">Create Account</button>
        </form>
        <div style="text-align: center; margin-top: 20px;"><a href="/login">Back to Login</a></div>
    </div>
    <script>
        function togglePass(id, icon) {
            let el = document.getElementById(id);
            if (el.type === "password") { el.type = "text"; icon.innerText = "🙈"; } else { el.type = "password"; icon.innerText = "👁️"; }
        }
    </script>
</body>
</html>

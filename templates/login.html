<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>Login - DAR</title>
    <style>
        body { font-family: Arial; padding: 20px; max-width: 400px; margin: auto; }
        .form-group { margin-bottom: 15px; display: flex; flex-direction: column; }
        input, button { padding: 10px; font-size: 16px; width: 100%; box-sizing: border-box; }
        button { background-color: #0056b3; color: white; border: none; cursor: pointer; margin-top: 10px; }
        .links { margin-top: 15px; text-align: center; font-size: 14px; }
    </style>
</head>
<body>
    <h2>Login</h2>
    {% with messages = get_flashed_messages() %}
      {% if messages %} <p style="color: red;">{{ messages[0] }}</p> {% endif %}
    {% endwith %}
    <form method="POST" action="/login">
        <div class="form-group"><label>Email:</label><input type="email" name="email" required></div>
        <div class="form-group"><label>Password:</label><input type="password" name="password" required></div>
        <button type="submit">Login</button>
    </form>
    <div class="links">
        <a href="/register">Create Account</a> | <a href="/forgot-password">Forgot Password?</a>
    </div>
</body>
</html>

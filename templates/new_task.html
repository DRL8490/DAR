<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Open Task - NMDC</title>
    <style>
        body { font-family: Arial; background-color: #f4f7f6; padding: 20px; max-width: 600px; margin: auto; }
        .card { background: white; padding: 20px; border-radius: 8px; box-shadow: 0 2px 5px rgba(0,0,0,0.1); }
        .form-group { margin-bottom: 15px; display: flex; flex-direction: column; }
        label { font-weight: bold; margin-bottom: 5px; font-size: 14px; color: #444; }
        select, input, textarea { padding: 10px; font-size: 16px; border: 1px solid #ccc; border-radius: 4px; }
        button { background-color: #0056b3; color: white; border: none; padding: 12px; font-size: 16px; border-radius: 6px; cursor: pointer; width: 100%; margin-top: 10px; }
        .btn-add { background-color: #6c757d; color: white; width: 40px; margin-top: 0; padding: 10px; font-weight: bold; }
        .btn-remove { background-color: #dc3545; color: white; width: 40px; margin-top: 0; padding: 10px; font-weight: bold; }
    </style>
</head>
<body>
    <div class="card">
        <h2>Open New Task</h2>
        <form action="/new_task" method="POST">
            
            <div class="form-group">
                <label>Requestor Dept:</label>
                <select name="requestor_dept" id="reqDept" onchange="updateReqNames()" required>
                    <option value="">-- Select Dept --</option>
                </select>
            </div>
            
            <div class="form-group">
                <label>Requestor Name:</label>
                <select name="requestor_name" id="reqName" required>
                    <option value="">-- Select Name --</option>
                </select>
            </div>
            
            <div class="form-group">
                <label>Assigned To:</label>
                <select name="assigned_to" required>
                    <option value="">-- Select Team Member --</option>
                    {% for u in users %}
                    <option value="{{ u.name }}">{{ u.name }}</option>
                    {% endfor %}
                </select>
            </div>

            <div class="form-group">
                <label>Task Category:</label>
                <select name="task_category" required>
                    <option value="">-- Select Category --</option>
                    {% for cat in categories %}
                    <option value="{{ cat.name }}">{{ cat.name }}</option>
                    {% endfor %}
                </select>
            </div>
            
            <div class="form-group"><label>Area:</label><select name="area" id="areaDropdown" onchange="updateLocations()" required></select></div>
            <div class="form-group"><label>Location:</label><select name="location" id="locationDropdown" onchange="updateSubLocations()"></select></div>
            <div class="form-group"><label>Sub-Location:</label><select name="sub_location" id="subLocationDropdown" onchange="updateWorkScopes()"></select></div>
            <div class="form-group"><label>Work Scope:</label><select name="work_scope" id="workScopeDropdown" required></select></div>

            <div class="form-group">
                <label>Instrument:</label>
                <select name="instrument" required>
                    <option value="">-- Select Instrument --</option>
                    {% for inst in instruments %}
                    <option value="{{ inst.name }}">{{ inst.name }}</option>
                    {% endfor %}
                </select>
            </div>

            <div class="form-group">
                <label>Action Required:</label>
                <select name="action_required" required>
                    <option value="">-- Select Action --</option>
                    {% for act in actions %}
                    <option value="{{ act.name }}">{{ act.name }}</option>
                    {% endfor %}
                </select>
            </div>

                        <div class="form-group" id="link-container">
                <label>Reference File Links (Optional):</label>
                <div style="display: flex; gap: 5px; margin-bottom: 5px;">
                    <input type="url" name="reference_link" placeholder="Paste OneDrive or file link..." style="flex: 1;">
                    <button type="button" class="btn-add" onclick="addLink()">+</button>
                </div>
            </div>

            <div class="form-group">
                <label>Opening Remarks:</label>
                <textarea name="remarks" rows="2" placeholder="Any initial notes or 'Other' specifications..."></textarea>
            </div>
            
            <button type="submit">Open Task</button>
            <a href="/" style="display: block; text-align: center; margin-top: 15px; color: #666; text-decoration: none;">Cancel</a>
        </form>
    </div>

    <script>
        // 1. Dynamic Links Logic
        function addLink() {
            let div = document.createElement('div');
            div.style.cssText = "display: flex; gap: 5px; margin-bottom: 5px;";
            div.innerHTML = '<input type="url" name="reference_link" placeholder="Paste another link..." style="flex: 1;"><button type="button" class="btn-remove" onclick="this.parentElement.remove()">X</button>';
            document.getElementById('link-container').appendChild(div);
        }

        // 2. Cascading Requestor Logic
        let reqTree = {{ req_dict_json | safe }};
        function popReqDepts() {
            let deptDrop = document.getElementById("reqDept");
            Object.keys(reqTree).forEach(d => {
                let opt = document.createElement("option"); opt.value = d; opt.innerHTML = d; deptDrop.appendChild(opt);
            });
        }
        function updateReqNames() {
            let dept = document.getElementById("reqDept").value;
            let nameDrop = document.getElementById("reqName");
            nameDrop.innerHTML = '<option value="">-- Select Name --</option>';
            if (dept && reqTree[dept]) {
                reqTree[dept].forEach(n => {
                    let opt = document.createElement("option"); opt.value = n; opt.innerHTML = n; nameDrop.appendChild(opt);
                });
            }
        }
        popReqDepts();

        // 3. Cascading Location Logic
        let schema = {{ schema_json | safe }};
        function populateDropdown(dropdownId, optionsList) {
            let dropdown = document.getElementById(dropdownId);
            dropdown.innerHTML = '<option value="">-- Select --</option>'; 
            optionsList.forEach(option => {
                let opt = document.createElement('option'); opt.value = option; opt.innerHTML = option; dropdown.appendChild(opt);
            });
        }
        function loadAreas() { populateDropdown("areaDropdown", Object.keys(schema)); updateLocations(); }
        function updateLocations() { let area = document.getElementById("areaDropdown").value; let locations = area && schema[area] ? Object.keys(schema[area]) : []; populateDropdown("locationDropdown", locations); updateSubLocations(); }
        function updateSubLocations() { let area = document.getElementById("areaDropdown").value; let location = document.getElementById("locationDropdown").value; let subLocations = (area && location && schema[area][location]) ? Object.keys(schema[area][location]) : []; populateDropdown("subLocationDropdown", subLocations); updateWorkScopes(); }
        function updateWorkScopes() { let area = document.getElementById("areaDropdown").value; let location = document.getElementById("locationDropdown").value; let subLocation = document.getElementById("subLocationDropdown").value; let scopes = (area && location && subLocation && schema[area][location][subLocation]) ? schema[area][location][subLocation] : []; populateDropdown("workScopeDropdown", scopes); }
        loadAreas();
    </script>
</body>
</html>

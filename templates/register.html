<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>Register - DAR</title>
    <style>/* Same CSS as login.html */ body { font-family: Arial; padding: 20px; max-width: 400px; margin: auto; } .form-group { margin-bottom: 15px; display: flex; flex-direction: column; } input, button { padding: 10px; font-size: 16px; width: 100%; box-sizing: border-box; } button { background-color: #28a745; color: white; border: none; cursor: pointer; margin-top: 10px; } .links { margin-top: 15px; text-align: center; font-size: 14px; }</style>
</head>
<body>
    <h2>Register Surveyor Account</h2>
    {% with messages = get_flashed_messages() %}
      {% if messages %} <p style="color: red;">{{ messages[0] }}</p> {% endif %}
    {% endwith %}
    <form method="POST" action="/register">
        <div class="form-group"><label>Full Name:</label><input type="text" name="name" required></div>
        <div class="form-group"><label>Email:</label><input type="email" name="email" required></div>
        <div class="form-group"><label>Password:</label><input type="password" name="password" required></div>
        <button type="submit">Register</button>
    </form>
    <div class="links"><a href="/login">Already have an account? Login here</a></div>
</body>
</html>
